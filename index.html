<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="競艇サイン">
<meta name="theme-color" content="#0d1117">
<title>競艇サインマイナー</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --good: #3fb950;
  --warn: #d29922;
  --bad: #f85149;
  --pink: #e879b9;
  --manshu: #f85149;
  --yaya: #d29922;
  --kata: #8b949e;
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px;
}
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
header h1 {
  margin: 0; font-size: 18px; font-weight: 600;
}
header .pink { color: var(--pink); }
.stats { display: flex; gap: 16px; flex: 1; flex-wrap: wrap; font-size: 12px; }
.stats div { color: var(--text-dim); }
.stats b { color: var(--text); font-weight: 600; font-size: 14px; }

nav.tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; gap: 0;
  overflow-x: auto;
}
nav.tabs button {
  background: none; border: none; color: var(--text-dim);
  padding: 10px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
nav.tabs button:hover { color: var(--text); }

main { padding: 20px; max-width: 1400px; margin: 0 auto; }
section { display: none; }
section.active { display: block; }

.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 16px; margin-bottom: 16px;
}
.card h2 { margin: 0 0 12px; font-size: 16px; }

button.primary {
  background: var(--accent); color: #fff; border: none; padding: 8px 16px;
  border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
}
button.primary:hover { opacity: 0.9; }
button.ghost {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
button.ghost:hover { background: var(--bg); }

input, select {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 4px; font-size: 13px;
}
label { color: var(--text-dim); font-size: 12px; margin-right: 6px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg3); padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
td { padding: 8px; border-bottom: 1px solid var(--border); }
tr:hover { background: var(--bg3); }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--accent); }
th.sort-asc::after { content: ' ▲'; font-size: 10px; color: var(--accent); }
th.sort-desc::after { content: ' ▼'; font-size: 10px; color: var(--accent); }

.lane-1 { color: #fff; background: #000; }
.lane-2 { color: #000; background: #f0f0f0; }
.lane-3 { color: #fff; background: #d63031; }
.lane-4 { color: #fff; background: #0984e3; }
.lane-5 { color: #000; background: #ffeaa7; }
.lane-6 { color: #fff; background: #00b894; }
.lane {
  display: inline-block; width: 24px; height: 24px; line-height: 24px;
  text-align: center; border-radius: 50%; font-weight: 700; font-size: 12px;
}

.badge {
  display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px;
  margin-right: 4px;
}
.badge.ok { background: var(--good); color: #fff; }
.badge.bad { background: var(--bad); color: #fff; }
.badge.warn { background: var(--warn); color: #fff; }
.badge.dim { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
.badge.manshu { background: var(--manshu); color: #fff; font-weight: 700; }
.badge.yaya { background: var(--yaya); color: #fff; font-weight: 700; }
.badge.kata { background: var(--bg3); color: var(--kata); border: 1px solid var(--border); }

pre.log {
  background: #000; color: #0f0; padding: 12px; border-radius: 4px;
  font-size: 11px; max-height: 320px; overflow-y: auto; font-family: monospace;
  white-space: pre-wrap; word-break: break-all;
}

.sign-row {
  display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 10px;
  align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border);
}
.sign-row .conf { color: var(--good); font-weight: 700; }
.sign-row .lift { color: var(--warn); }

.kpi { display: flex; gap: 24px; flex-wrap: wrap; }
.kpi > div { background: var(--bg3); padding: 12px 16px; border-radius: 6px; min-width: 120px; }
.kpi b { font-size: 22px; display: block; }
.kpi span { color: var(--text-dim); font-size: 11px; }
.error { color: var(--bad); }
.muted { color: var(--text-dim); }
.flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

/* 荒れアラート cards */
.are-race-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 10px; overflow: hidden;
}
.are-race-header {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  cursor: pointer; user-select: none;
}
.are-race-header:hover { background: var(--bg2); }
.are-score {
  font-size: 22px; font-weight: 700; min-width: 40px; text-align: right;
}
.are-title { flex: 1; }
.are-title .venue-r { font-weight: 600; font-size: 15px; }
.are-title .race-title { color: var(--text-dim); font-size: 11px; }
.are-fired-count { color: var(--text-dim); font-size: 12px; }
.are-expand-icon { color: var(--text-dim); font-size: 12px; transition: transform 0.15s; }
.are-expand-icon.open { transform: rotate(90deg); }
.are-detail {
  display: none; padding: 0 14px 12px;
  border-top: 1px solid var(--border);
}
.are-detail.open { display: block; }
.fired-item {
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.fired-item:last-child { border-bottom: none; }
.fired-item .fired-desc { font-weight: 500; margin-bottom: 4px; }
.fired-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; font-size: 12px; color: var(--text-dim); }
.fired-meta span b { color: var(--text); }

/* 条件タブ */
.conditions-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px;
  margin-bottom: 16px;
}
.chip {
  display: inline-block; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 2px 8px; font-size: 11px; color: var(--text-dim);
  margin: 2px;
}
.chip b { color: var(--text); }
.common-section { margin-bottom: 8px; }
.common-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }

/* 照合タブ */
.verify-summary {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
  margin-bottom: 16px;
}
.verify-kpi {
  background: var(--bg3); border-radius: 6px; padding: 12px 14px;
}
.verify-kpi .val { font-size: 20px; font-weight: 700; }
.verify-kpi .lbl { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
.verify-kpi .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.roi-note {
  border: 1px solid var(--border); border-left: 3px solid var(--warn);
  background: rgba(210,153,34,.07); border-radius: 4px;
  padding: 8px 12px; font-size: 12px; color: var(--text-dim);
  margin-top: 12px;
}
</style>
</head>
<body>

<header>
  <h1>競艇サイン<span class="pink">マイナー</span> <span style="font-size:11px;color:var(--text-dim);font-weight:400">v4.1</span></h1>
  <div class="stats" id="stats">
    <div>レース <b id="s-races">-</b></div>
    <div>女子戦 <b id="s-ladies">-</b></div>
    <div>期間 <b id="s-range">-</b></div>
  </div>
  <button class="ghost" onclick="refreshStats()">↻</button>
</header>

<nav class="tabs">
  <button data-tab="alert" class="active">荒れアラート</button>
  <button data-tab="conditions">荒れ条件・型</button>
  <button data-tab="verify">結果照合・回収率</button>
  <button data-tab="race">レース詳細</button>
  <button data-tab="collect">データ収集</button>
</nav>

<main>

<!-- 荒れアラート -->
<section id="tab-alert" class="active">
  <div class="card">
    <div class="flex" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">荒れアラート</h2>
      <div class="flex">
        <label>日付</label>
        <input type="text" id="alert-date" placeholder="YYYYMMDD" style="width:110px">
        <button class="primary" onclick="loadAlert()">判定</button>
      </div>
    </div>
    <p class="muted" style="margin:8px 0 0;font-size:12px">万舟警報(赤) = 3連単 ¥10,000以上の荒れ期待 / やや荒れ(橙) = ¥5,000以上 / 堅め(灰) = 通常</p>
  </div>
  <div id="alert-list"></div>
</section>

<!-- 荒れ条件・型 -->
<section id="tab-conditions">
  <div id="conditions-content">
    <p class="muted">タブを開くと自動で読み込みます。</p>
  </div>
</section>

<!-- 結果照合・回収率 -->
<section id="tab-verify">
  <div class="card">
    <div class="flex" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">結果照合・回収率</h2>
      <div class="flex">
        <label>から</label>
        <input type="text" id="verify-from" placeholder="YYYYMMDD" style="width:110px">
        <label>まで</label>
        <input type="text" id="verify-to" placeholder="YYYYMMDD" style="width:110px">
        <button class="primary" onclick="loadVerify()">照合</button>
      </div>
    </div>
  </div>
  <div id="verify-content"></div>
</section>

<!-- レース詳細 -->
<section id="tab-race">
  <div class="card">
    <h2>レース詳細</h2>
    <div class="flex" style="margin-bottom:12px">
      <label>日付</label><input id="r-date" type="date">
      <label>会場</label>
      <select id="r-jcd"></select>
      <label>R</label>
      <select id="r-rno">
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
      <button class="primary" onclick="loadRace()">表示</button>
    </div>
    <div id="race-detail"></div>
  </div>
</section>

<!-- データ収集 -->
<section id="tab-collect">
  <div class="card">
    <h2>過去データ収集</h2>
    <p class="muted">期間内の女子戦データを boatrace.jp から取得します（1リクエスト 1 秒間隔）。</p>
    <div class="flex" style="margin-bottom:12px">
      <label>開始</label><input id="c-start" type="date">
      <label>終了</label><input id="c-end" type="date">
      <label><input id="c-force" type="checkbox"> 強制再取得</label>
      <button class="primary" onclick="startCollect()">収集開始</button>
    </div>
    <div id="collect-status"></div>
    <pre class="log" id="collect-log"></pre>
  </div>
</section>

</main>

<script>
const VENUES = {
  "01":"桐生","02":"戸田","03":"江戸川","04":"平和島","05":"多摩川","06":"浜名湖",
  "07":"蒲郡","08":"常滑","09":"津","10":"三国","11":"びわこ","12":"住之江",
  "13":"尼崎","14":"鳴門","15":"丸亀","16":"児島","17":"宮島","18":"徳山",
  "19":"下関","20":"若松","21":"芦屋","22":"福岡","23":"唐津","24":"大村"
};

// ---- ユーティリティ ----
function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function ymd8(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}
function stripHyphen(s) { return (s || '').replace(/-/g, ''); }
function fmtYen(n) {
  if (n == null) return '-';
  return '¥' + Number(n).toLocaleString('ja-JP');
}
function fmtPct(v) {
  if (v == null) return '-';
  return (v * 100).toFixed(1) + '%';
}
function fmtLift(v) {
  if (v == null) return '-';
  return '×' + Number(v).toFixed(1);
}

// ---- API BASE ----
const API_BASE = (() => {
  const h = location.hostname;
  if (h.endsWith('github.io') || h.includes('vercel') || h.includes('netlify')) {
    return 'https://kyotei-sign.onrender.com';
  }
  return '';
})();

async function api(path, opts) {
  const r = await fetch(API_BASE + path, opts || {});
  if (!r.ok) throw new Error(`${path}: ${r.status}`);
  return r.json();
}

// ---- 日付の初期値 ----
const today = new Date();
const todayStr8 = ymd8(today);
const todayStrHyphen = ymd(today);

document.getElementById('alert-date').value = todayStr8;
document.getElementById('r-date').value = todayStrHyphen;

const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth() - 1);
document.getElementById('c-end').value = todayStrHyphen;
document.getElementById('c-start').value = ymd(monthAgo);

const threeMonthsAgo = new Date(); threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
document.getElementById('verify-from').value = ymd8(threeMonthsAgo);
document.getElementById('verify-to').value = todayStr8;

// ---- 会場プルダウン ----
const rJcdSel = document.getElementById('r-jcd');
Object.entries(VENUES).forEach(([k, v]) => {
  const o = document.createElement('option');
  o.value = k;
  o.textContent = `${k} ${v}`;
  rJcdSel.appendChild(o);
});

// ---- タブ切替 ----
let _conditionsLoaded = false;
document.querySelectorAll('nav.tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
    if (b.dataset.tab === 'conditions' && !_conditionsLoaded) {
      loadConditions();
    }
  });
});

// ---- ヘッダー統計 ----
async function refreshStats() {
  try {
    const s = await api('/api/stats');
    document.getElementById('s-races').textContent = s.races != null ? s.races : '-';
    document.getElementById('s-ladies').textContent = s.ladies_races != null ? s.ladies_races : '-';
    if (s.date_range && s.date_range[0]) {
      document.getElementById('s-range').textContent = `${s.date_range[0]}〜${s.date_range[1]}`;
    }
  } catch (e) { console.error('stats:', e); }
}

// ---- 荒れ度バッジ ----
function levelBadge(level) {
  if (!level) return '';
  if (level === '万舟警報') return '<span class="badge manshu">万舟警報</span>';
  if (level === 'やや荒れ') return '<span class="badge yaya">やや荒れ</span>';
  return '<span class="badge kata">堅め</span>';
}
function scoreColor(level) {
  if (level === '万舟警報') return 'var(--manshu)';
  if (level === 'やや荒れ') return 'var(--yaya)';
  return 'var(--kata)';
}

// ---- 荒れアラート ----
async function loadAlert() {
  const dateVal = (document.getElementById('alert-date').value || '').trim() || todayStr8;
  const list = document.getElementById('alert-list');
  list.innerHTML = '<p class="muted">読み込み中...</p>';
  try {
    const d = await api('/api/are/today?date=' + dateVal);
    const races = Array.isArray(d.races) ? d.races : [];
    if (!races.length) {
      list.innerHTML = '<div class="card"><p class="muted">この日の荒れ候補レースはありません。</p></div>';
      return;
    }
    list.innerHTML = '';
    races.forEach((race, idx) => {
      const card = document.createElement('div');
      card.className = 'are-race-card';

      const header = document.createElement('div');
      header.className = 'are-race-header';

      const score = Number(race.are_score || 0).toFixed(1);
      const nFired = race.n_fired != null ? race.n_fired : (Array.isArray(race.fired) ? race.fired.length : 0);

      header.innerHTML = `
        <div class="are-score" style="color:${scoreColor(race.level)}">${score}</div>
        <div class="are-title">
          ${levelBadge(race.level)}
          <div class="venue-r">${race.venue || ''} ${race.rno != null ? race.rno + 'R' : ''}</div>
          <div class="race-title">${race.title || ''}</div>
        </div>
        <div class="are-fired-count">${nFired}条件発火</div>
        <div class="are-expand-icon" id="icon-${idx}">▶</div>
      `;

      const detail = document.createElement('div');
      detail.className = 'are-detail';
      detail.id = 'are-detail-' + idx;

      const fired = Array.isArray(race.fired) ? race.fired : [];
      if (!fired.length) {
        detail.innerHTML = '<p class="muted" style="padding:8px 0">発火条件なし</p>';
      } else {
        detail.innerHTML = fired.map(f => {
          const confPct = f.conf != null ? (f.conf * 100).toFixed(1) + '%' : '-';
          const liftStr = f.lift != null ? '×' + Number(f.lift).toFixed(1) : '-';
          const softStr = f.soft_rate != null ? (f.soft_rate * 100).toFixed(0) + '%' : '-';
          const expStr = f.expect_index != null ? fmtYen(f.expect_index) : '-';
          const supStr = f.support != null ? f.support : '-';
          return `<div class="fired-item">
            <div class="fired-desc">${f.desc || ''}</div>
            <div class="fired-meta">
              <span>万舟率 <b>${confPct}</b></span>
              <span>lift <b>${liftStr}</b></span>
              <span>soft率 <b>${softStr}</b></span>
              <span>期待配当指数 <b>${expStr}</b></span>
              <span>発火 <b>${supStr}</b></span>
            </div>
          </div>`;
        }).join('');
      }

      card.appendChild(header);
      card.appendChild(detail);

      // クリックで展開 + レース詳細へジャンプ
      header.addEventListener('click', () => {
        const isOpen = detail.classList.contains('open');
        detail.classList.toggle('open', !isOpen);
        document.getElementById('icon-' + idx).classList.toggle('open', !isOpen);
        // レース詳細タブも開く
        if (race.jcd && race.rno && (d.date || dateVal)) {
          const raceDate = (d.date || dateVal).replace(/-/g, '');
          const hyphenDate = raceDate.length === 8
            ? `${raceDate.slice(0,4)}-${raceDate.slice(4,6)}-${raceDate.slice(6)}`
            : raceDate;
          document.getElementById('r-date').value = hyphenDate;
          document.getElementById('r-jcd').value = String(race.jcd).padStart(2, '0');
          document.getElementById('r-rno').value = race.rno;
          document.querySelector('nav.tabs button[data-tab=race]').click();
          loadRace();
        }
      });

      list.appendChild(card);
    });

    if (d.note) {
      const note = document.createElement('p');
      note.className = 'muted';
      note.style.fontSize = '11px';
      note.textContent = d.note;
      list.appendChild(note);
    }
  } catch (e) {
    list.innerHTML = `<div class="card"><p class="error">エラー: ${e.message}</p></div>`;
  }
}

// ---- 荒れ条件・型 ----
async function loadConditions() {
  const wrap = document.getElementById('conditions-content');
  wrap.innerHTML = '<p class="muted">読み込み中...</p>';
  try {
    const d = await api('/api/are/conditions');
    _conditionsLoaded = true;
    let html = '';

    // ベースレート
    const base = d.base || {};
    html += `<div class="card">
      <h2>ベースレート</h2>
      <div class="kpi">
        <div><b style="color:var(--manshu)">${fmtPct(base.manshu_rate)}</b><span>万舟ベース率</span></div>
        <div><b style="color:var(--yaya)">${fmtPct(base.soft_rate)}</b><span>やや荒れベース率</span></div>
        <div><b>${base.n != null ? Number(base.n).toLocaleString('ja-JP') : '-'}</b><span>総レース数</span></div>
        <div><b>${base.avg_pay_manshu != null ? fmtYen(base.avg_pay_manshu) : '-'}</b><span>平均万舟配当</span></div>
      </div>
    </div>`;

    // 3パネル
    html += '<div class="conditions-grid">';

    // 荒れ常連ランキング
    const regulars = Array.isArray(d.regulars) ? d.regulars : [];
    html += '<div class="card" style="overflow-x:auto"><h2>荒れ常連ランキング</h2>';
    if (regulars.length) {
      html += '<table><thead><tr><th>選手</th><th>発火</th><th>万舟率</th><th>lift</th><th>soft率</th><th>平均万舟配当</th></tr></thead><tbody>';
      regulars.forEach(r => {

          <td><b>${r.name || ''}</b></td>
          <td>${r.support != null ? r.support : '-'}</td>
          <td><b style="color:var(--manshu)">${r.conf != null ? (r.conf*100).toFixed(1) + '%' : '-'}</b></td>
          <td style="color:var(--warn)">${fmtLift(r.lift)}</td>
          <td>${r.soft_rate != null ? (r.soft_rate*100).toFixed(0) + '%' : '-'}</td>
          <td>${r.avg_pay_manshu != null ? fmtYen(r.avg_pay_manshu) : '-'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="muted">データなし</p>';
    }
    html += '</div>';

    // 3号艇の荒らし役
    const arashi = Array.isArray(d.arashi_lane3) ? d.arashi_lane3 : [];
    html += '<div class="card" style="overflow-x:auto"><h2>3号艇の荒らし役</h2>';
    if (arashi.length) {
      html += '<table><thead><tr><th>選手</th><th>発火</th><th>万舟率</th><th>lift</th><th>平均万舟配当</th></tr></thead><tbody>';
      arashi.forEach(r => {
        html += `<tr>
          <td><b>${r.name || ''}</b></td>
          <td>${r.support != null ? r.support : '-'}</td>
          <td><b style="color:var(--manshu)">${r.conf != null ? (r.conf*100).toFixed(1) + '%' : '-'}</b></td>
          <td style="color:var(--warn)">${fmtLift(r.lift)}</td>
          <td>${r.avg_pay_manshu != null ? fmtYen(r.avg_pay_manshu) : '-'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="muted">データなし</p>';
    }
    html += '</div>';

    // 荒れ水面ランキング
    const venues = Array.isArray(d.venues) ? d.venues : [];
    html += '<div class="card" style="overflow-x:auto"><h2>荒れ水面ランキング</h2>';
    if (venues.length) {
      html += '<table><thead><tr><th>会場</th><th>レース数</th><th>万舟率</th><th>soft率</th><th>lift</th><th>平均万舟配当</th></tr></thead><tbody>';
      venues.forEach(r => {
        html += `<tr>
          <td><b>${r.venue || ''}</b></td>
          <td>${r.support != null ? r.support : '-'}</td>
          <td><b style="color:var(--manshu)">${r.conf != null ? (r.conf*100).toFixed(1) + '%' : '-'}</b></td>
          <td>${r.soft_rate != null ? (r.soft_rate*100).toFixed(0) + '%' : '-'}</td>
          <td style="color:var(--warn)">${fmtLift(r.lift)}</td>
          <td>${r.avg_pay_manshu != null ? fmtYen(r.avg_pay_manshu) : '-'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="muted">データなし</p>';
    }
    html += '</div>';

    html += '</div>'; // end conditions-grid

    // 共通項サマリ
    const common = d.common || {};
    const COMMON_LABELS = {
      racer: '選手', racer_lane: '選手×コース', venue: '会場', lane: 'コース',
      motor_last: 'モーター末尾', toban_last: '登番末尾', kanji: '漢字パターン', types: '条件種別'
    };
    const commonEntries = Object.entries(common).filter(([, arr]) => Array.isArray(arr) && arr.length > 0);
    if (commonEntries.length) {
      html += '<div class="card"><h2>共通項サマリ</h2>';
      for (const [key, items] of commonEntries) {
        const label = COMMON_LABELS[key] || key;
        html += `<div class="common-section">
          <div class="common-label">${label}</div>
          <div>`;
        for (const [name, count] of items) {
          html += `<span class="chip">${name} <b>×${count}</b></span>`;
        }
        html += '</div></div>';
      }
      html += '</div>';
    }

    // 全条件テーブル（ソート可能）
    const conditions = Array.isArray(d.conditions) ? d.conditions : [];
    if (conditions.length) {
      html += `<div class="card" id="cond-table-card"><h2>全条件テーブル <span class="muted" style="font-size:12px;font-weight:400">${conditions.length}件</span></h2>
        <div style="overflow-x:auto">
          <table id="cond-table">
            <thead><tr>
              <th class="sortable" data-col="support" data-dir="desc">万舟数/発火</th>
              <th class="sortable" data-col="conf" data-dir="desc">率</th>
              <th class="sortable" data-col="lift" data-dir="desc">lift</th>
              <th class="sortable" data-col="soft_rate" data-dir="desc">soft率</th>
              <th class="sortable" data-col="avg_pay_manshu" data-dir="desc">平均万舟配当</th>
              <th class="sortable" data-col="expect_index" data-dir="desc">期待配当指数</th>
              <th>条件</th>
              <th>種別</th>
            </tr></thead>
            <tbody id="cond-tbody"></tbody>
          </table>
        </div>
      </div>`;
    }

    wrap.innerHTML = html;

    // 条件テーブル初期描画とソート
    if (conditions.length) {
      window._conditionsData = conditions;
      renderConditionsTable('lift', 'desc');
      setupConditionsSort();
    }

  } catch (e) {
    wrap.innerHTML = `<div class="card"><p class="error">エラー: ${e.message}</p></div>`;
  }
}

function renderConditionsTable(col, dir) {
  const rows = (window._conditionsData || []).slice();
  rows.sort((a, b) => {
    const av = a[col] != null ? a[col] : -Infinity;
    const bv = b[col] != null ? b[col] : -Infinity;
    return dir === 'desc' ? bv - av : av - bv;
  });
  const tbody = document.getElementById('cond-tbody');
  if (!tbody) return;
  tbody.innerHTML = rows.map(c => {
    const hitsStr = (c.hits != null ? c.hits : '-') + '/' + (c.support != null ? c.support : '-');
    const typesStr = Array.isArray(c.types) ? c.types.join(', ') : (c.types || '-');
    return `<tr>
      <td>${hitsStr}</td>
      <td><b style="color:var(--manshu)">${c.conf != null ? (c.conf*100).toFixed(1)+'%' : '-'}</b></td>
      <td style="color:var(--warn)">${fmtLift(c.lift)}</td>
      <td>${c.soft_rate != null ? (c.soft_rate*100).toFixed(0)+'%' : '-'}</td>
      <td>${c.avg_pay_manshu != null ? fmtYen(c.avg_pay_manshu) : '-'}</td>
      <td>${c.expect_index != null ? fmtYen(c.expect_index) : '-'}</td>
      <td>${c.desc || ''}</td>
      <td class="muted">${typesStr}</td>
    </tr>`;
  }).join('');
}

function setupConditionsSort() {
  let currentCol = 'lift';
  let currentDir = 'desc';
  const headers = document.querySelectorAll('#cond-table th.sortable');
  // 初期状態でlift列にマーク
  headers.forEach(th => {
    if (th.dataset.col === 'lift') th.classList.add('sort-desc');
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (currentCol === col) {
        currentDir = currentDir === 'desc' ? 'asc' : 'desc';
      } else {
        currentCol = col;
        currentDir = 'desc';
      }
      headers.forEach(x => { x.classList.remove('sort-asc', 'sort-desc'); });
      th.classList.add(currentDir === 'desc' ? 'sort-desc' : 'sort-asc');
      renderConditionsTable(currentCol, currentDir);
    });
  });
}

// ---- 結果照合・回収率 ----
async function loadVerify() {
  const fromVal = (document.getElementById('verify-from').value || '').trim();
  const toVal = (document.getElementById('verify-to').value || '').trim();
  const wrap = document.getElementById('verify-content');
  wrap.innerHTML = '<p class="muted">照合中...</p>';
  try {
    const d = await api(`/api/are/verify?from=${fromVal}&to=${toVal}`);
    let html = '';

    const hitRate = d.hit_rate != null ? (d.hit_rate * 100).toFixed(1) + '%' : '-';
    const baseRate = d.base_rate != null ? (d.base_rate * 100).toFixed(1) + '%' : '-';
    const liftStr = d.lift != null ? '×' + Number(d.lift).toFixed(1) : '';
    const softHit = d.soft_hit_rate != null ? (d.soft_hit_rate * 100).toFixed(1) + '%' : '-';
    const approxRoi = d.approx_roi_pct != null ? Math.round(d.approx_roi_pct).toLocaleString('ja-JP') + '%' : '-';
    const avgPay = d.avg_pay_manshu != null ? fmtYen(d.avg_pay_manshu) : '-';

    html += '<div class="card"><h2>照合サマリ</h2><div class="verify-summary">';
    html += kpiBox(d.races != null ? Number(d.races).toLocaleString('ja-JP') : '-', '対象レース');
    html += kpiBox(d.fired_races != null ? Number(d.fired_races).toLocaleString('ja-JP') : '-', '発火レース');
    html += kpiBox(d.manshu_in_fired != null ? Number(d.manshu_in_fired).toLocaleString('ja-JP') : '-', '万舟的中');
    html += kpiBox(`<span style="color:var(--manshu)">${hitRate}</span>`, '発火時万舟率', `ベース ${baseRate} ${liftStr}`);
    html += kpiBox(`<span style="color:var(--yaya)">${softHit}</span>`, 'soft的中率');
    html += kpiBox(avgPay, '平均万舟配当');
    html += kpiBox(`<span style="color:var(--good)">${approxRoi}</span>`, '概算回収率(目安)');
    html += '</div>';

    html += `<div class="roi-note">概算回収率は『発火時の万舟率 × 平均万舟配当』の楽観上限(<b>100%で収支トントン</b>／買い目1点・的中=平均配当と仮定)。3連単は買い目を増やすほど実際の回収率は下がります。正式値は買い目確定後に算出。</div>`;
    html += '</div>';

    // by_level テーブル
    if (d.by_level && typeof d.by_level === 'object') {
      const levels = Object.entries(d.by_level);
      if (levels.length) {
        html += '<div class="card"><h2>レベル別</h2><div style="overflow-x:auto"><table><thead><tr><th>レベル</th><th>発火</th><th>万舟</th><th>的中率</th></tr></thead><tbody>';
        levels.forEach(([lvl, v]) => {
          const rate = v.rate != null ? (v.rate * 100).toFixed(1) + '%' : '-';
          html += `<tr>
            <td>${levelBadge(lvl)}</td>
            <td>${v.fired != null ? v.fired : '-'}</td>
            <td>${v.manshu != null ? v.manshu : '-'}</td>
            <td><b>${rate}</b></td>
          </tr>`;
        });
        html += '</tbody></table></div></div>';
      }
    }

    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card"><p class="error">エラー: ${e.message}</p></div>`;
  }
}

function kpiBox(val, label, sub) {
  return `<div class="verify-kpi">
    <div class="val">${val}</div>
    <div class="lbl">${label}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

// ---- レース詳細（オカルトのみ：勝率/モーター/枠評価は使わない） ----

function occultMemberTable(entries) {
  const KAN = ['子','美','菜','奈','花','あ','ゆ'];
  let h = '<h4 style="margin-top:20px">出走メンバー（オカルト要素のみ）</h4>';
  h += '<p class="muted" style="font-size:11px;margin:-4px 0 6px">勝率・モーター2連率・級別など一般情報は出しません。荒れ条件が拾うオカルト要素だけを並べています。</p>';
  h += '<table><thead><tr><th>艇</th><th>選手</th><th>登番</th><th>登番末尾</th><th>モーター末尾</th><th>名前の漢字</th><th>荒らし役</th></tr></thead><tbody>';
  for (const e of entries) {
    const tobanLast = (e.toban != null && e.toban !== '') ? String(e.toban).slice(-1) : '-';
    const motorLast = (e.motor_no != null) ? String(e.motor_no).slice(-1) : '-';
    const hit = KAN.filter(k => (e.name || '').includes(k));
    const kanCell = hit.length ? hit.map(k => `<span class="chip">${k}</span>`).join('') : '<span class="muted">-</span>';
    const arashi = e.lane === 3 ? '<span class="badge manshu">荒らし役候補</span>' : '';
    h += `<tr>
      <td><span class="lane lane-${e.lane}">${e.lane}</span></td>
      <td><b>${e.name || ''}</b></td>
      <td class="muted">${e.toban || ''}</td>
      <td><b>${tobanLast}</b></td>
      <td><b>${motorLast}</b></td>
      <td>${kanCell}</td>
      <td>${arashi}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  return h;
}

function occultForecast(a) {
  if (!a) return '';
  const score = Number(a.are_score || 0).toFixed(1);
  let h = `<div class="are-race-card" style="cursor:default">
    <div class="are-race-header">
      <div class="are-score" style="color:${scoreColor(a.level)}">${score}</div>
      <div class="are-title">${levelBadge(a.level)}<div class="venue-r">オカルト荒れ予報</div></div>
      <div class="are-fired-count">${a.n_fired || 0}条件発火</div>
    </div>`;
  const fired = Array.isArray(a.fired) ? a.fired : [];
  if (!fired.length) {
    h += '<div class="are-detail open"><p class="muted" style="padding:8px 0">発火するオカルト荒れ条件なし → 堅め(本命決着)の公算。</p></div>';
  } else {
    h += '<div class="are-detail open">' + fired.map(f => {
      const confPct = f.conf != null ? (f.conf * 100).toFixed(1) + '%' : '-';
      const liftStr = f.lift != null ? '×' + Number(f.lift).toFixed(1) : '-';
      const softStr = f.soft_rate != null ? (f.soft_rate * 100).toFixed(0) + '%' : '-';
      const expStr = f.expect_index != null ? fmtYen(f.expect_index) : '-';
      const supStr = f.support != null ? f.support : '-';
      return `<div class="fired-item">
        <div class="fired-desc">${f.desc || ''}</div>
        <div class="fired-meta">
          <span>万舟率 <b>${confPct}</b></span>
          <span>lift <b>${liftStr}</b></span>
          <span>soft率 <b>${softStr}</b></span>
          <span>期待配当指数 <b>${expStr}</b></span>
          <span>発火 <b>${supStr}</b></span>
        </div>
      </div>`;
    }).join('');
  }
  h += '</div>';
  return h;
}

async function loadRace() {
  const date = stripHyphen(document.getElementById('r-date').value);
  const jcd = document.getElementById('r-jcd').value;
  const rno = document.getElementById('r-rno').value;
  const wrap = document.getElementById('race-detail');
  wrap.innerHTML = '<p class="muted">読み込み中...</p>';
  try {
    const d = await api(`/api/race?date=${date}&jcd=${jcd}&rno=${rno}`);
    let html = '';
    if (d.race) {
      html += `<h3>${d.race.venue || ''} ${d.race.rno != null ? d.race.rno + 'R' : ''} - ${d.race.title || ''}</h3>`;
    }
    if (d.are) {
      html += occultForecast(d.are);
    } else {
      html += '<p class="muted">出走表が未取得です。「データ収集」タブで取得してから再表示してください。</p>';
    }
    if (d.entries && d.entries.length) {
      html += occultMemberTable(d.entries);
    }
    if (d.result) {
      html += '<h4 style="margin-top:20px">結果（オカルト答え合わせ）</h4>';
      let fin = [];
      try { fin = JSON.parse(d.result.finish_json || '[]'); } catch {}
      html += '<table><thead><tr><th>着</th><th>艇</th><th>選手</th></tr></thead><tbody>';
      for (const r of fin) {
        const [rank, lane, toban, name] = r;
        html += `<tr><td><b>${rank}</b></td><td><span class="lane lane-${lane}">${lane}</span></td><td>${name} (${toban})</td></tr>`;
      }
      html += '</tbody></table>';
      html += `<p>決まり手: <b>${d.result.determinant || '-'}</b></p>`;
      const yen = d.result.payout_3t_yen || 0;
      const tier = yen >= 10000 ? '<span class="badge manshu">万舟</span>' : (yen >= 5000 ? '<span class="badge yaya">やや荒れ</span>' : '<span class="badge kata">堅</span>');
      html += `<p>3連単 ${d.result.payout_3t || '-'} ¥${yen.toLocaleString('ja-JP')} ${tier}</p>`;
      html += `<p>3連複 ${d.result.payout_3f || '-'} ¥${(d.result.payout_3f_yen || 0).toLocaleString('ja-JP')}</p>`;
    }
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<p class="error">エラー: ${e.message}</p>`;
  }
}

// ---- データ収集 ----
let collectJobId = null;

async function startCollect() {
  const body = {
    start: stripHyphen(document.getElementById('c-start').value),
    end: stripHyphen(document.getElementById('c-end').value),
    force: document.getElementById('c-force').checked,
  };
  document.getElementById('collect-status').textContent = '開始中...';
  document.getElementById('collect-log').textContent = '';
  try {
    const resp = await fetch(API_BASE + '/api/collect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const r = await resp.json();
    if (resp.status === 409 && r.existing_job_id) {
      collectJobId = r.existing_job_id;
      document.getElementById('collect-status').innerHTML =
        `<span style="color:var(--warn)">既存のジョブ「${collectJobId}」が走行中。そのまま進捗を表示します。</span>`;
      pollJob();
      return;
    }
    if (!resp.ok) throw new Error(r.error || `HTTP ${resp.status}`);
    collectJobId = r.job_id;
    document.getElementById('collect-status').textContent = `ジョブID: ${collectJobId}`;
    pollJob();
  } catch (e) {
    document.getElementById('collect-status').innerHTML = `<span class="error">${e.message}</span>`;
  }
}

async function autoAttachCollect() {
  for (const jid of ['bootstrap']) {
    try {
      const j = await api('/api/job/' + jid);
      if (j.status === 'running') {
        collectJobId = jid;
        document.getElementById('collect-status').innerHTML =
          `<span style="color:var(--warn)">サーバー側で「${jid}」が走行中。表示中...</span>`;
        pollJob();
        return;
      }
    } catch {}
  }
}

async function pollJob() {
  if (!collectJobId) return;
  try {
    const j = await api('/api/job/' + collectJobId);
    document.getElementById('collect-status').innerHTML = `状態: <b>${j.status}</b>`;
    document.getElementById('collect-log').textContent = (j.log || []).join('\n');
    const logEl = document.getElementById('collect-log');
    logEl.scrollTop = logEl.scrollHeight;
    if (j.status === 'done') {
      refreshStats();
      document.getElementById('collect-status').innerHTML += ` 完了: ${JSON.stringify(j.result)}`;
      return;
    }
    if (j.status === 'error') return;
    setTimeout(pollJob, 1500);
  } catch (e) {
    document.getElementById('collect-status').innerHTML = `<span class="error">${e.message}</span>`;
  }
}

// ---- 起動 ----
refreshStats();
loadAlert();
autoAttachCollect();
