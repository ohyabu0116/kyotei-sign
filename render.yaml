services:
  - type: web
    name: kyotei-sign
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AUTO_INIT_DAYS
        value: "3"
